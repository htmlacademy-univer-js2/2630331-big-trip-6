parserOptions:
  ecmaVersion: 2022
  sourceType: 'module'

env:
  es2022: true
  browser: true

extends: 'htmlacademy/vanilla'

rules:
  'no-empty': 'off'
  'no-useless-catch': 'off'
  'no-console': 'off'
  'camelcase': 'off'
  'no-unused-vars': 
    - 'error'
    - argsIgnorePattern: '^_'
      varsIgnorePattern: '^_'
  'quotes': 'off'
